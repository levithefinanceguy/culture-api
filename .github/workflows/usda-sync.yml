name: Sync USDA Data

on:
  schedule:
    # Runs 1st of every month at 3am UTC
    - cron: "0 3 1 * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run USDA bulk import
        run: npx ts-node scripts/import-bulk.ts --cleanup

      - name: Check results
        run: |
          echo "Database size:"
          ls -lh culture.db

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: culture-db-${{ github.run_number }}
          path: culture.db
          retention-days: 30
