name: Sync Chain Menus

on:
  schedule:
    # Runs every Monday at 6am UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update-menus:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run menu update for all chains
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx ts-node scripts/update-menus.ts

      - name: Check for database changes
        id: check-changes
        run: |
          if git diff --quiet culture.db 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit database changes
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add culture.db
          git commit -m "chore: weekly menu sync — $(date -u +%Y-%m-%d)"
          git push

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: culture-db-menu-sync-${{ github.run_number }}
          path: culture.db
          retention-days: 30
